# 프론트(Vite 빌드 산출물)와 API(Express)를 한 도메인에서 서비스할 때 예시입니다.
# server_name·경로·SSL은 환경에 맞게 수정하세요.

upstream hospital_api {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name example.hospital.local;

    root /var/www/hospital-scheduling/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://hospital_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
